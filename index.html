<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reno — Renovation Inspiration</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #F7F4EF;
    --warm-white: #FDFCFA;
    --ink: #1C1A17;
    --ink-60: rgba(28,26,23,0.6);
    --ink-20: rgba(28,26,23,0.12);
    --ink-08: rgba(28,26,23,0.06);
    --terracotta: #C4613A;
    --terracotta-light: #F5E8E2;
    --sage: #5A7A5E;
    --sage-light: #E8F0E8;
    --slate: #4A5568;
    --gold: #B8860B;
    --gold-light: #FBF3DC;
    --radius: 12px;
    --radius-sm: 8px;
    --sidebar: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    display: flex;
    min-height: 100vh;
  }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar);
    min-height: 100vh;
    background: var(--ink);
    display: flex;
    flex-direction: column;
    padding: 2rem 1.25rem;
    position: fixed;
    top: 0; left: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--cream);
    margin-bottom: 0.25rem;
    letter-spacing: -0.5px;
  }
  .logo-sub {
    font-size: 0.7rem;
    color: rgba(247,244,239,0.4);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }
  .nav-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(247,244,239,0.35);
    margin-bottom: 0.5rem;
    padding-left: 0.75rem;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.6rem 0.75rem;
    border-radius: var(--radius-sm);
    color: rgba(247,244,239,0.6);
    font-size: 0.875rem;
    font-weight: 400;
    background: none;
    border: none;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 2px;
  }
  .nav-btn:hover { background: rgba(247,244,239,0.08); color: var(--cream); }
  .nav-btn.active { background: rgba(247,244,239,0.12); color: var(--cream); font-weight: 500; }
  .nav-btn svg { flex-shrink: 0; opacity: 0.7; }
  .nav-btn.active svg { opacity: 1; }
  .nav-section { margin-bottom: 1.75rem; }
  .sidebar-foot {
    margin-top: auto;
    font-size: 0.7rem;
    color: rgba(247,244,239,0.2);
    line-height: 1.5;
    padding-left: 0.75rem;
  }

  /* MAIN */
  .main {
    margin-left: var(--sidebar);
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    background: var(--warm-white);
    border-bottom: 1px solid var(--ink-20);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    letter-spacing: -0.3px;
  }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .content { padding: 2rem; flex: 1; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 0.5rem 1rem;
    border-radius: var(--radius-sm);
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--ink-20);
    background: var(--warm-white);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--cream); border-color: var(--ink-20); }
  .btn-primary {
    background: var(--ink); color: var(--cream);
    border-color: var(--ink);
  }
  .btn-primary:hover { background: #2e2b26; }
  .btn-terra {
    background: var(--terracotta); color: #fff;
    border-color: var(--terracotta);
  }
  .btn-terra:hover { background: #b05530; }
  .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.75rem; }
  .btn-xs { padding: 0.2rem 0.5rem; font-size: 0.7rem; }
  .btn-danger { color: #b91c1c; border-color: rgba(185,28,28,0.2); }
  .btn-danger:hover { background: #fef2f2; }

  /* CARDS */
  .card {
    background: var(--warm-white);
    border: 1px solid var(--ink-20);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
  }

  /* FORM */
  .form-group { margin-bottom: 1rem; }
  .form-label {
    display: block;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--ink-60);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  input[type=text], input[type=url], select, textarea {
    width: 100%;
    padding: 0.55rem 0.875rem;
    border: 1px solid var(--ink-20);
    border-radius: var(--radius-sm);
    font-size: 0.875rem;
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-white);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus, input[type=url]:focus, select:focus, textarea:focus {
    border-color: var(--terracotta);
  }
  textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

  /* PHOTO DROP */
  .photo-zone {
    border: 1.5px dashed var(--ink-20);
    border-radius: var(--radius);
    padding: 2rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--cream);
    position: relative;
  }
  .photo-zone:hover { border-color: var(--terracotta); background: var(--terracotta-light); }
  .photo-zone.drag-over { border-color: var(--terracotta); background: var(--terracotta-light); }
  .photo-zone.has-photo { padding: 0; border-style: solid; border-color: var(--ink-20); overflow: hidden; }
  .photo-zone img { width: 100%; max-height: 240px; object-fit: cover; display: block; border-radius: calc(var(--radius) - 1px); }
  .photo-icon { font-size: 2rem; margin-bottom: 0.5rem; color: var(--ink-60); }
  .photo-hint { font-size: 0.8125rem; color: var(--ink-60); }
  .photo-sub { font-size: 0.75rem; color: rgba(28,26,23,0.35); margin-top: 0.25rem; }
  input[type=file] { display: none; }

  /* STYLE TAGS */
  .style-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .style-tag {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    border: 1px solid var(--ink-20);
    background: var(--warm-white);
    color: var(--ink-60);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .style-tag:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .style-tag.sel { background: var(--terracotta); color: #fff; border-color: var(--terracotta); }

  /* ROOM BADGE */
  .room-badge {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }
  .source-pill {
    display: inline-block;
    font-size: 0.68rem;
    padding: 2px 7px;
    border-radius: 20px;
    background: var(--gold-light);
    color: var(--gold);
    margin-left: 4px;
  }

  /* IDEAS GRID */
  .ideas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }
  .idea-card {
    background: var(--warm-white);
    border: 1px solid var(--ink-20);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
  }
  .idea-card:hover { border-color: rgba(28,26,23,0.3); }
  .idea-card.selectable { cursor: pointer; }
  .idea-card.selected { border: 2px solid var(--terracotta); }
  .idea-card .check-mark {
    position: absolute; top: 8px; right: 8px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--terracotta);
    color: #fff;
    display: none;
    align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    z-index: 2;
  }
  .idea-card.selected .check-mark { display: flex; }
  .idea-card .card-photo { width: 100%; height: 130px; object-fit: cover; display: block; }
  .idea-card .card-photo-ph {
    width: 100%; height: 80px;
    display: flex; align-items: center; justify-content: center;
    background: var(--cream);
    color: var(--ink-20);
    font-size: 1.5rem;
  }
  .idea-card .card-body { padding: 10px 12px; }
  .idea-card .card-title { font-size: 0.8125rem; font-weight: 500; margin-bottom: 4px; line-height: 1.3; }
  .idea-card .card-notes { font-size: 0.75rem; color: var(--ink-60); margin-bottom: 6px; line-height: 1.4; }
  .idea-card .card-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 8px; }
  .idea-card .card-tag { font-size: 0.68rem; padding: 1px 6px; border-radius: 20px; background: var(--cream); color: var(--ink-60); }
  .idea-card .card-actions { display: flex; gap: 4px; }

  /* FILTERS */
  .filters {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 1.5rem; align-items: center;
  }
  .filters select { max-width: 160px; width: auto; }
  .count-pill {
    font-size: 0.75rem;
    background: var(--ink-08);
    border: 1px solid var(--ink-20);
    border-radius: 20px;
    padding: 3px 10px;
    color: var(--ink-60);
    white-space: nowrap;
  }

  /* SELECT MODE BAR */
  .select-bar {
    background: var(--terracotta-light);
    border: 1px solid rgba(196,97,58,0.3);
    border-radius: var(--radius-sm);
    padding: 0.75rem 1rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }
  .select-bar p { font-size: 0.8125rem; color: var(--terracotta); font-weight: 500; }
  .select-bar-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  /* BOARDS */
  .boards-list { display: flex; flex-direction: column; gap: 16px; }
  .board-card {
    background: var(--warm-white);
    border: 1px solid var(--ink-20);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .board-header {
    padding: 1rem 1.25rem;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    border-bottom: 1px solid var(--ink-08);
  }
  .board-name { font-family: 'DM Serif Display', serif; font-size: 1.1rem; letter-spacing: -0.2px; margin-bottom: 2px; }
  .board-meta { font-size: 0.75rem; color: var(--ink-60); }
  .board-header-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .board-body { padding: 1rem 1.25rem; }
  .board-mood-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
  }
  .mood-tile {
    background: var(--cream);
    border: 1px solid var(--ink-20);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .mood-tile img { width: 100%; height: 80px; object-fit: cover; display: block; }
  .mood-tile .mood-ph { width: 100%; height: 55px; display: flex; align-items: center; justify-content: center; color: var(--ink-20); font-size: 1.1rem; }
  .mood-tile-body { padding: 6px 8px; }
  .mood-tile-title { font-size: 0.7rem; font-weight: 500; line-height: 1.3; margin-bottom: 2px; }
  .mood-tile-tags { display: flex; gap: 3px; flex-wrap: wrap; }
  .mood-tile-tag { font-size: 0.6rem; padding: 1px 5px; border-radius: 10px; background: var(--warm-white); color: var(--ink-60); border: 0.5px solid var(--ink-20); }
  .mood-remove { display: flex; justify-content: flex-end; padding: 4px 6px 6px; }

  /* NEW BOARD FORM */
  .new-board-form {
    background: var(--cream);
    border: 1px dashed var(--ink-20);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
  }
  .new-board-form h3 { font-size: 0.875rem; font-weight: 500; margin-bottom: 1rem; }
  .new-board-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
  .new-board-row input { flex: 2; min-width: 180px; }
  .new-board-row select { flex: 1; min-width: 130px; }

  /* EMPTY */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--ink-60); font-size: 0.875rem; }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

  /* TABS inside pages */
  .page { display: none; }
  .page.active { display: block; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: var(--cream);
    padding: 0.625rem 1.25rem;
    border-radius: 100px;
    font-size: 0.8125rem;
    z-index: 999;
    transition: transform 0.25s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MOBILE */
  @media (max-width: 768px) {
    .sidebar { width: 100%; min-height: auto; flex-direction: row; padding: 0.75rem 1rem; position: relative; }
    .logo-sub, .nav-label, .sidebar-foot { display: none; }
    .logo { margin-bottom: 0; font-size: 1.2rem; }
    .nav-section { margin-bottom: 0; display: flex; gap: 4px; }
    .sidebar { flex-wrap: wrap; }
    .main { margin-left: 0; }
    body { flex-direction: column; }
    .sidebar { flex-direction: column; min-height: auto; }
    .nav-btn { padding: 0.4rem 0.6rem; font-size: 0.8rem; }
    .content { padding: 1rem; }
    .topbar { padding: 0.75rem 1rem; }
    .ideas-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="logo">Reno</div>
  <div class="logo-sub">Inspiration</div>
  <div class="nav-section">
    <div class="nav-label">Collect</div>
    <button class="nav-btn active" onclick="showPage('capture')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Capture
    </button>
    <button class="nav-btn" onclick="showPage('ideas')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      All ideas
    </button>
  </div>
  <div class="nav-section">
    <div class="nav-label">Create</div>
    <button class="nav-btn" onclick="showPage('moodboard')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
      Mood boards
    </button>
  </div>
  <div class="sidebar-foot">Data saved locally<br>in your browser</div>
</nav>

<main class="main">
  <div class="topbar">
    <span class="topbar-title" id="page-title">Capture an idea</span>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>

  <div class="content">

    <!-- CAPTURE PAGE -->
    <div class="page active" id="page-capture">
      <div class="card" style="max-width:640px">
        <div class="form-group">
          <label class="form-label">Photo</label>
          <div class="photo-zone" id="photo-zone" onclick="document.getElementById('file-input').click()"
            ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
            <div id="photo-placeholder">
              <div class="photo-icon">📷</div>
              <p class="photo-hint">Click to upload or drag a photo here</p>
              <p class="photo-sub">JPG, PNG, HEIC — straight from your camera roll</p>
            </div>
            <img id="photo-preview" src="" alt="Preview" style="display:none" />
          </div>
          <div id="photo-btn-row" style="display:none;gap:6px;margin-top:8px;display:none">
            <button class="btn btn-sm" onclick="document.getElementById('file-input').click()">Change photo</button>
            <button class="btn btn-sm btn-danger" onclick="clearPhoto()">Remove</button>
          </div>
          <input type="file" id="file-input" accept="image/*" onchange="onFileSelect(event)" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Title or description</label>
            <input type="text" id="f-title" placeholder="e.g. Sage green shaker cabinets" />
          </div>
          <div class="form-group">
            <label class="form-label">Room</label>
            <select id="f-room">
              <option value="">— select a room —</option>
              <option>Kitchen</option><option>Living room</option><option>Main bedroom</option>
              <option>Guest bedroom</option><option>Bathroom</option><option>En suite</option>
              <option>Hallway</option><option>Garden / outdoor</option><option>Home office</option>
              <option>Whole house</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Source</label>
            <select id="f-source">
              <option value="photo">My photo</option>
              <option value="web">Web / Pinterest</option>
              <option value="magazine">Magazine / print</option>
              <option value="showroom">Showroom / store</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Link (optional)</label>
            <input type="url" id="f-url" placeholder="Paste URL if from web" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea id="f-notes" placeholder="Colour names, brand, price, why you love it…"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Style tags</label>
          <div class="style-tags" id="style-tags-input"></div>
        </div>

        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:0.5rem">
          <button class="btn" onclick="clearForm()">Clear</button>
          <button class="btn btn-terra" onclick="saveIdea()">Save idea</button>
        </div>
      </div>
    </div>

    <!-- ALL IDEAS PAGE -->
    <div class="page" id="page-ideas">
      <div id="select-mode-bar" style="display:none">
        <div class="select-bar">
          <p id="sel-count-label">0 ideas selected</p>
          <div class="select-bar-actions">
            <select id="target-board-select" style="font-size:0.8125rem;padding:0.35rem 0.625rem;border-radius:var(--radius-sm);border:1px solid var(--ink-20);background:var(--warm-white);font-family:'DM Sans',sans-serif">
              <option value="">— pick a board —</option>
            </select>
            <button class="btn btn-sm btn-terra" onclick="assignSelected()">Add to board</button>
            <button class="btn btn-sm" onclick="cancelSelectMode()">Cancel</button>
          </div>
        </div>
      </div>
      <div class="filters">
        <select onchange="renderIdeas()" id="fil-room">
          <option value="">All rooms</option>
          <option>Kitchen</option><option>Living room</option><option>Main bedroom</option>
          <option>Guest bedroom</option><option>Bathroom</option><option>En suite</option>
          <option>Hallway</option><option>Garden / outdoor</option><option>Home office</option>
          <option>Whole house</option>
        </select>
        <select onchange="renderIdeas()" id="fil-tag"><option value="">All styles</option></select>
        <select onchange="renderIdeas()" id="fil-src">
          <option value="">All sources</option>
          <option value="photo">My photos</option><option value="web">Web</option>
          <option value="magazine">Magazine</option><option value="showroom">Showroom</option>
        </select>
        <span class="count-pill" id="idea-count-pill">0 ideas</span>
      </div>
      <div class="ideas-grid" id="ideas-grid"></div>
    </div>

    <!-- MOOD BOARDS PAGE -->
    <div class="page" id="page-moodboard">
      <div class="new-board-form">
        <h3>Create a new mood board</h3>
        <div class="new-board-row">
          <input type="text" id="nb-name" placeholder="e.g. Kitchen – bold & dark" style="flex:2;min-width:180px" />
          <select id="nb-room" style="flex:1;min-width:130px">
            <option value="">Any room</option>
            <option>Kitchen</option><option>Living room</option><option>Main bedroom</option>
            <option>Guest bedroom</option><option>Bathroom</option><option>En suite</option>
            <option>Hallway</option><option>Garden / outdoor</option><option>Home office</option>
            <option>Whole house</option>
          </select>
          <button class="btn btn-primary" onclick="createBoard()">Create board</button>
        </div>
      </div>
      <div class="boards-list" id="boards-list"></div>
    </div>

  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const STYLE_TAGS = ['minimalist','maximalist','Scandi','mid-century','industrial','rustic','coastal','contemporary','traditional','dark & moody','light & airy','colourful','neutral tones','textured','sustainable','Art Deco','Japandi','bohemian'];
const ROOM_STYLES = {
  Kitchen: {bg:'#E8F0FB',color:'#1a3d7a'},
  'Living room': {bg:'#E6F3EC',color:'#1a4d2e'},
  'Main bedroom': {bg:'#EEEAFC',color:'#3d2d7a'},
  'Guest bedroom': {bg:'#FCE8F0',color:'#7a1a3d'},
  Bathroom: {bg:'#E8EFF8',color:'#1a3060'},
  'En suite': {bg:'#E8F5EC',color:'#1a4020'},
  Hallway: {bg:'#FDF0E8',color:'#7a3d1a'},
  'Garden / outdoor': {bg:'#EAF2E8',color:'#2a4d1a'},
  'Home office': {bg:'#EEE8FC',color:'#3d1a7a'},
  'Whole house': {bg:'#F0EDE8',color:'#3d3428'},
};
const SRC_LABELS = {photo:'My photo',web:'Web',magazine:'Magazine',showroom:'Showroom',other:'Other'};

let ideas = JSON.parse(localStorage.getItem('reno_ideas') || '[]');
let boards = JSON.parse(localStorage.getItem('reno_boards') || '[]');
let nextIdeaId = parseInt(localStorage.getItem('reno_next_idea') || '1');
let nextBoardId = parseInt(localStorage.getItem('reno_next_board') || '1');
let selectedTags = [];
let currentPhoto = null;
let selectMode = false;
let selectedIds = new Set();
let currentPage = 'capture';

function save() {
  localStorage.setItem('reno_ideas', JSON.stringify(ideas));
  localStorage.setItem('reno_boards', JSON.stringify(boards));
  localStorage.setItem('reno_next_idea', nextIdeaId);
  localStorage.setItem('reno_next_board', nextBoardId);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function showPage(p) {
  currentPage = p;
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['capture','ideas','moodboard'][i] === p);
  });
  const titles = {capture:'Capture an idea', ideas:'All ideas', moodboard:'Mood boards'};
  document.getElementById('page-title').textContent = titles[p];
  if (p === 'ideas') { cancelSelectMode(); renderIdeas(); }
  if (p === 'moodboard') renderBoards();
}

// STYLE TAGS INIT
function initTags() {
  const container = document.getElementById('style-tags-input');
  const fil = document.getElementById('fil-tag');
  STYLE_TAGS.forEach(t => {
    const el = document.createElement('span');
    el.className = 'style-tag'; el.textContent = t;
    el.onclick = () => {
      if (selectedTags.includes(t)) { selectedTags = selectedTags.filter(x => x !== t); el.classList.remove('sel'); }
      else { selectedTags.push(t); el.classList.add('sel'); }
    };
    container.appendChild(el);
    const o = document.createElement('option'); o.value = t; o.textContent = t;
    fil.appendChild(o);
  });
}

// PHOTO
function onDragOver(e) { e.preventDefault(); document.getElementById('photo-zone').classList.add('drag-over'); }
function onDragLeave() { document.getElementById('photo-zone').classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('photo-zone').classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) readFile(f);
}
function onFileSelect(e) { const f = e.target.files[0]; if (f) readFile(f); }
function readFile(f) {
  const r = new FileReader();
  r.onload = ev => setPhotoPreview(ev.target.result);
  r.readAsDataURL(f);
}
function setPhotoPreview(data) {
  currentPhoto = data;
  document.getElementById('photo-placeholder').style.display = 'none';
  const p = document.getElementById('photo-preview'); p.src = data; p.style.display = 'block';
  const z = document.getElementById('photo-zone'); z.classList.add('has-photo'); z.onclick = null;
  document.getElementById('photo-btn-row').style.display = 'flex';
}
function clearPhoto() {
  currentPhoto = null;
  document.getElementById('photo-placeholder').style.display = 'block';
  const p = document.getElementById('photo-preview'); p.src = ''; p.style.display = 'none';
  const z = document.getElementById('photo-zone'); z.classList.remove('has-photo');
  z.onclick = () => document.getElementById('file-input').click();
  document.getElementById('photo-btn-row').style.display = 'none';
  document.getElementById('file-input').value = '';
}

function clearForm() {
  document.getElementById('f-title').value = '';
  document.getElementById('f-room').value = '';
  document.getElementById('f-url').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-source').value = 'photo';
  selectedTags = [];
  document.querySelectorAll('.style-tag').forEach(e => e.classList.remove('sel'));
  clearPhoto();
}

function saveIdea() {
  const title = document.getElementById('f-title').value.trim();
  const room = document.getElementById('f-room').value;
  if (!title) { alert('Please add a title or description.'); return; }
  if (!room) { alert('Please select a room.'); return; }
  ideas.push({
    id: nextIdeaId++, title, room,
    source: document.getElementById('f-source').value,
    url: document.getElementById('f-url').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    tags: [...selectedTags],
    photo: currentPhoto,
    created: Date.now()
  });
  save();
  clearForm();
  toast('Idea saved!');
  showPage('ideas');
}

// IDEAS
function renderIdeas() {
  const room = document.getElementById('fil-room').value;
  const tag = document.getElementById('fil-tag').value;
  const src = document.getElementById('fil-src').value;
  const filtered = ideas.filter(i =>
    (!room || i.room === room) &&
    (!tag || i.tags.includes(tag)) &&
    (!src || i.source === src)
  );
  document.getElementById('idea-count-pill').textContent = filtered.length + ' idea' + (filtered.length !== 1 ? 's' : '');
  const grid = document.getElementById('ideas-grid');
  if (!filtered.length) {
    grid.innerHTML = '<p class="empty"><div class="empty-icon">🏠</div>No ideas yet — head to Capture to add some!</p>';
    return;
  }
  const rs = ROOM_STYLES;
  grid.innerHTML = filtered.map(i => {
    const style = rs[i.room] || {bg:'#f0ede8',color:'#3d3428'};
    const sel = selectedIds.has(i.id);
    return `<div class="idea-card${selectMode?' selectable':''}${sel?' selected':''}" id="icard-${i.id}" onclick="${selectMode?`toggleSel(${i.id})`:'void(0)'}">
      <div class="check-mark">✓</div>
      ${i.photo ? `<img class="card-photo" src="${i.photo}" alt="${i.title}" />` : `<div class="card-photo-ph">🖼</div>`}
      <div class="card-body">
        <span class="room-badge" style="background:${style.bg};color:${style.color}">${i.room}</span>
        <span class="source-pill">${SRC_LABELS[i.source]||i.source}</span>
        <p class="card-title" style="margin-top:6px">${i.title}</p>
        ${i.notes ? `<p class="card-notes">${i.notes}</p>` : ''}
        ${i.url ? `<a href="${i.url}" target="_blank" style="font-size:0.7rem;color:var(--terracotta);text-decoration:none;display:block;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">↗ View source</a>` : ''}
        ${i.tags.length ? `<div class="card-tags">${i.tags.map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>` : ''}
        ${!selectMode ? `<div class="card-actions"><button class="btn btn-xs btn-danger" onclick="event.stopPropagation();deleteIdea(${i.id})">Delete</button></div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggleSel(id) {
  if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
  document.getElementById('sel-count-label').textContent = selectedIds.size + ' idea' + (selectedIds.size !== 1 ? 's' : '') + ' selected';
  renderIdeas();
}

function deleteIdea(id) {
  if (!confirm('Delete this idea?')) return;
  ideas = ideas.filter(i => i.id !== id);
  boards.forEach(b => { b.ideaIds = b.ideaIds.filter(x => x !== id); });
  save(); renderIdeas(); toast('Idea deleted');
}

function enterSelectMode(boardId) {
  selectMode = true; selectedIds = new Set();
  const bar = document.getElementById('select-mode-bar'); bar.style.display = 'block';
  document.getElementById('sel-count-label').textContent = '0 ideas selected';
  const sel = document.getElementById('target-board-select');
  sel.innerHTML = '<option value="">— pick a board —</option>';
  boards.forEach(b => {
    const o = document.createElement('option'); o.value = b.id; o.textContent = b.name;
    if (b.id === boardId) o.selected = true;
    sel.appendChild(o);
  });
  showPage('ideas');
}

function cancelSelectMode() {
  selectMode = false; selectedIds = new Set();
  document.getElementById('select-mode-bar').style.display = 'none';
  renderIdeas();
}

function assignSelected() {
  const boardId = parseInt(document.getElementById('target-board-select').value);
  if (!boardId) { alert('Please pick a board first.'); return; }
  if (!selectedIds.size) { alert('Select at least one idea.'); return; }
  const board = boards.find(b => b.id === boardId);
  selectedIds.forEach(id => { if (!board.ideaIds.includes(id)) board.ideaIds.push(id); });
  save(); cancelSelectMode();
  toast(selectedIds.size + ' ideas added to board');
  showPage('moodboard'); renderBoards();
}

// BOARDS
function createBoard() {
  const name = document.getElementById('nb-name').value.trim();
  if (!name) { alert('Please give the board a name.'); return; }
  boards.push({ id: nextBoardId++, name, room: document.getElementById('nb-room').value, ideaIds: [], created: Date.now() });
  document.getElementById('nb-name').value = '';
  document.getElementById('nb-room').value = '';
  save(); renderBoards(); toast('Board created!');
}

function deleteBoard(id) {
  if (!confirm('Delete this board? Your ideas will not be deleted.')) return;
  boards = boards.filter(b => b.id !== id);
  save(); renderBoards(); toast('Board deleted');
}

function removeFromBoard(boardId, ideaId) {
  const b = boards.find(x => x.id === boardId);
  if (b) b.ideaIds = b.ideaIds.filter(id => id !== ideaId);
  save(); renderBoards();
}

function renderBoards() {
  const list = document.getElementById('boards-list');
  if (!boards.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🎨</div><p>No boards yet. Create one above, then select ideas to add.</p></div>';
    return;
  }
  list.innerHTML = boards.map(b => {
    const boardIdeas = b.ideaIds.map(id => ideas.find(i => i.id === id)).filter(Boolean);
    const tagCount = {};
    boardIdeas.forEach(i => i.tags.forEach(t => { tagCount[t] = (tagCount[t]||0)+1; }));
    const topTags = Object.entries(tagCount).sort((a,c)=>c[1]-a[1]).slice(0,3).map(([t])=>t);
    return `<div class="board-card">
      <div class="board-header">
        <div>
          <div class="board-name">${b.name}</div>
          <div class="board-meta">${b.room||'All rooms'} &middot; ${boardIdeas.length} idea${boardIdeas.length!==1?'s':''}${topTags.length?' &middot; '+topTags.join(', '):''}</div>
        </div>
        <div class="board-header-actions">
          <button class="btn btn-sm" onclick="enterSelectMode(${b.id})">+ Add ideas</button>
          <button class="btn btn-sm btn-danger" onclick="deleteBoard(${b.id})">Delete</button>
        </div>
      </div>
      <div class="board-body">
        ${boardIdeas.length ? `
          <div class="board-mood-grid">
            ${boardIdeas.map(i => `
              <div class="mood-tile">
                ${i.photo ? `<img src="${i.photo}" alt="${i.title}" />` : `<div class="mood-ph">🖼</div>`}
                <div class="mood-tile-body">
                  <div class="mood-tile-title">${i.title}</div>
                  ${i.notes?`<div style="font-size:0.65rem;color:var(--ink-60);margin-bottom:3px;line-height:1.3">${i.notes.substring(0,60)}${i.notes.length>60?'…':''}</div>`:''}
                  <div class="mood-tile-tags">${i.tags.slice(0,2).map(t=>`<span class="mood-tile-tag">${t}</span>`).join('')}</div>
                </div>
                <div class="mood-remove">
                  <button class="btn btn-xs btn-danger" onclick="removeFromBoard(${b.id},${i.id})">Remove</button>
                </div>
              </div>
            `).join('')}
          </div>
        ` : `<p style="font-size:0.8125rem;color:var(--ink-60);padding:0.5rem 0">Empty — click "+ Add ideas" to select from your saved ideas.</p>`}
      </div>
    </div>`;
  }).join('');
}

initTags();
renderIdeas();
renderBoards();
</script>
</body>
</html>
